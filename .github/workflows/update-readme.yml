name: 🔄 Auto-Update README
 
on:
  push:
    branches:
      - main
  schedule:
    # Roda todo dia às 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite execução manual
 
jobs:
  update-readme:
    runs-on: ubuntu-latest
    # Permissões explícitas — necessário para o GITHUB_TOKEN fazer push
    permissions:
      contents: write
 
    steps:
      - name: ⬇️ Checkout do repositório
        uses: actions/checkout@v4
 
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub requests
 
      - name: 🤖 Executar script de atualização
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: python .github/scripts/update_readme.py
 
      - name: 📤 Commit e Push das mudanças
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: auto-update README with latest stats [skip ci]'
          file_pattern: README.md
          branch: main
